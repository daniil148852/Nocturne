name: Android Build (Nocturne)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK (API 34, build-tools 34.0.0)
        uses: android-actions/setup-android@v3
        with:
          api-level: "34"
          build-tools-version: "34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/notifications
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'app/build.gradle.kts', 'settings.gradle.kts', 'build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          set -e
          ls -lh app/build/outputs/apk/debug/
          APK=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          echo "APK=$APK"
          echo "size_bytes=$(stat -c%s "$APK")"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nocturne-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
